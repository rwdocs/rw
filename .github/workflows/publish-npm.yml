name: Publish npm packages

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish-core:
    name: Publish @rwdocs/core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-native-*
          path: packages/core/artifacts

      - name: Prepare platform packages
        working-directory: packages/core
        run: npx napi artifacts --output-dir artifacts --npm-dir npm

      - name: Publish platform packages
        working-directory: packages/core
        run: |
          for dir in npm/*/; do
            npm publish "$dir" --access public --provenance
          done

      - name: Publish main package
        working-directory: packages/core
        run: npm publish --access public --provenance

  publish-viewer:
    name: Publish @rwdocs/viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download viewer build
        uses: actions/download-artifact@v4
        with:
          name: npm-viewer
          path: packages/viewer/dist/lib

      - name: Publish
        working-directory: packages/viewer
        run: npm publish --access public --provenance --ignore-scripts
