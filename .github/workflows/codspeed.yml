name: CodSpeed

on:
  # Always run on main so every commit re-establishes the comparison baseline.
  push:
    branches: [main]
  # On PRs, only run when something that could actually move the benchmarks
  # changes — Rust source, Cargo deps, the bench fixtures, or this workflow.
  # Docs-only, frontend-only, and CI-only PRs (from anyone, including Renovate's
  # frontend/npm bumps) don't trigger the metered macro run. A Rust dependency
  # bump touches Cargo.lock and still runs — which is exactly when you want it.
  pull_request:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "crates/rw-renderer/benches/fixtures/**"
      - ".github/workflows/codspeed.yml"
  # Allow running from the Actions tab (e.g. to force a run on a skipped PR).
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel a push to main — those runs
  # establish the performance baseline that PRs are compared against.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Two instruments, chosen to fit what each benchmark measures:
#
# - simulation (CPU instruction counting, free `ubuntu-latest`): deterministic,
#   ideal for the pure-CPU renderer bench with no I/O or threads.
# - walltime (real elapsed time, CodSpeed `codspeed-macro` bare-metal runners):
#   correctly measures the rw-site benches, whose cost is filesystem I/O and the
#   parallel scanner — work whose instruction count is not reproducible under
#   simulation.
#
# The rw-site benches are compiled on a free GitHub ARM64 runner and only *run*
# on the (metered) macro runner, so building doesn't consume macro-runner
# minutes. `cargo codspeed run` executes the previously-built benches without
# recompiling. All jobs authenticate via the GitHub App + OIDC (no token needed
# for a public repo), and both instruments upload to the same CodSpeed project
# within one workflow run (required for CodSpeed to emit results).

jobs:
  simulation:
    name: Simulation (renderer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain, cache, and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          cache-extra-identifier: ${{ runner.arch }}
          bins: cargo-codspeed

      - name: Build the renderer benchmark
        run: cargo codspeed build -p rw-renderer

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run

  # Compile the rw-site benches on a free ARM64 runner so the macro runner never
  # spends metered minutes building. Built on 22.04 (glibc 2.35) so the binaries
  # stay forward-compatible with whatever glibc the macro runner ships.
  build-site:
    name: Build site benches (free ARM64)
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain, cache, and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          cache-extra-identifier: ${{ runner.arch }}
          bins: cargo-codspeed

      # -m walltime so the artifacts land in target/codspeed/walltime, which is
      # what the macro job's `cargo codspeed run` (walltime mode) looks for.
      - name: Build the site benchmarks
        run: cargo codspeed build -p rw-site -m walltime

      # Tar preserves the executable bit that upload-artifact would otherwise drop.
      - name: Package built benches
        run: tar -czf codspeed-site.tar.gz target/codspeed

      - name: Upload built benches
        uses: actions/upload-artifact@v4
        with:
          name: codspeed-site-benches
          path: codspeed-site.tar.gz
          retention-days: 1

  walltime:
    name: Walltime (site)
    needs: build-site
    runs-on: codspeed-macro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      # No toolchain setup: the macro runner ships Rust, and this job only *runs*
      # the prebuilt benches — so it needs cargo-codspeed and nothing else. This
      # is what uv/ruff do, and it keeps ~40s of the toolchain reinstall off the
      # metered runner.
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-codspeed

      - name: Download built benches
        uses: actions/download-artifact@v4
        with:
          name: codspeed-site-benches

      - name: Unpack built benches
        run: tar -xzf codspeed-site.tar.gz

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: cargo codspeed run
