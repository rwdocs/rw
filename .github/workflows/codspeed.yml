name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow running from the Actions tab.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but never cancel a push to main — those runs
  # establish the performance baseline that PRs are compared against.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Two instruments, chosen to fit what each benchmark measures:
#
# - simulation (CPU instruction counting, free `ubuntu-latest`): deterministic,
#   ideal for the pure-CPU renderer bench with no I/O or threads.
# - walltime (real elapsed time, CodSpeed `codspeed-macro` bare-metal runners):
#   correctly measures the rw-site benches, whose cost is filesystem I/O and the
#   parallel scanner — work whose instruction count is not reproducible under
#   simulation. Free for open-source within the monthly macro-runner minutes.
#
# Both jobs upload to the same CodSpeed project within one workflow run (required
# for CodSpeed to emit results), and both authenticate via the GitHub App + OIDC
# (no token needed for a public repo).

jobs:
  simulation:
    name: Simulation (renderer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain, cache, and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          cache-extra-identifier: ${{ runner.arch }}
          bins: cargo-codspeed

      - name: Build the renderer benchmark
        run: cargo codspeed build -p rw-renderer

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run

  walltime:
    name: Walltime (site)
    runs-on: codspeed-macro
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust toolchain, cache, and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          # Macro runners are ARM64; keep their cache distinct from the x64 job.
          cache-extra-identifier: ${{ runner.arch }}
          bins: cargo-codspeed

      - name: Build the site benchmarks
        run: cargo codspeed build -p rw-site

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: walltime
          run: cargo codspeed run
