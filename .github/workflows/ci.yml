name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack install

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Build frontend bundle
        run: yarn workspace @rwdocs/viewer run build

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -W clippy::pedantic

      - name: Run svelte-check
        run: yarn workspace @rwdocs/viewer run check

      - name: Check Prettier formatting
        run: yarn workspace @rwdocs/viewer exec prettier --check .

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack install

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Build frontend bundle
        run: yarn workspace @rwdocs/viewer run build

      - name: Run Rust tests
        run: cargo test --all-targets

      - name: Run frontend tests
        run: yarn workspace @rwdocs/viewer run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack install

      - name: Install frontend dependencies
        run: yarn install --immutable

      - name: Build frontend bundle
        run: yarn workspace @rwdocs/viewer run build

      - name: Build CLI
        run: cargo build -p rw

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/viewer

      - name: Run E2E tests
        run: yarn workspace @rwdocs/viewer run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: packages/viewer/playwright-report/
          retention-days: 7
