name: Build npm packages

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    name: Build native - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack install

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build native addon
        run: |
          yarn workspace @rwdocs/core run build
        env:
          NAPI_RS_TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-native-${{ matrix.target }}
          path: packages/core/*.node
          if-no-files-found: error

  build-viewer:
    name: Build viewer library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack install

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build library
        run: yarn workspace @rwdocs/viewer run build:lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-viewer
          path: packages/viewer/dist/lib/
          if-no-files-found: error
