name: Build npm packages

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-napi-cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-zigbuild: true
    name: Build native - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig
        if: ${{ matrix.use-zigbuild }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        if: ${{ matrix.use-zigbuild }}
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: |
          npm -w @rwdocs/core run build -- ${{ matrix.use-zigbuild && '-x' || matrix.use-napi-cross && '--use-napi-cross' || '' }}
        env:
          NAPI_RS_TARGET: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-native-${{ matrix.target }}
          path: packages/core/*.node
          if-no-files-found: error

  build-viewer:
    name: Build viewer library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm -w @rwdocs/viewer run build:lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-viewer
          path: packages/viewer/dist/lib/
          if-no-files-found: error
