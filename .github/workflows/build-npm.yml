name: Build npm packages

on:
  workflow_call:
    inputs:
      plan:
        required: false
        type: string

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            build: npm -w @rwdocs/core run build -- --target aarch64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            build: npm -w @rwdocs/core run build -- --target x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            build: npm -w @rwdocs/core run build -- --target x86_64-unknown-linux-musl -x
    name: Build native - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: ${{ contains(matrix.target, 'musl') }}
        with:
          tool: cargo-zigbuild

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: ${{ matrix.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-native-${{ matrix.target }}
          path: packages/core/*.node
          if-no-files-found: error

  test-native:
    name: Test native - ${{ matrix.target }}
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            image: node:22-slim
          - target: x86_64-unknown-linux-musl
            image: node:22-alpine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-native-${{ matrix.target }}
          path: packages/core/

      - name: Test binding
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.image }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: node -e "const c = require('./packages/core'); console.log('OK', Object.keys(c))"

  build-viewer:
    name: Build viewer library
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm -w @rwdocs/viewer run build:lib

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-viewer
          path: packages/viewer/dist/lib/
          if-no-files-found: error
