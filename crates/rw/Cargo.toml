[package]
name = "rw"
description = "Documentation engine - CLI"
repository = "https://github.com/rwdocs/rw"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "rw"
path = "src/main.rs"

[lints]
workspace = true

[features]
default = []
embed-assets = ["rw-assets/embed"]

[dependencies]
rw-assets = { workspace = true }
rw-cache = { workspace = true }
rw-storage-s3 = { workspace = true, features = ["publish"] }
rw-config = { workspace = true }
rw-confluence = { workspace = true }
rw-server = { workspace = true }
rw-site = { workspace = true }
rw-storage = { workspace = true }
rw-storage-fs = { workspace = true }
clap = { version = "4", features = ["derive", "env"] }
console = "0.16"
open = "5"
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rw-comments = { workspace = true }
rw-server-info = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
ureq = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
